<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Manipulation Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <div class="project-box">
            <div class="oval-frame">
                <img src="penguins.jpg" alt="Penguins">
            </div>
        </div>

        <div class="project-box">
            <div class="football-border">
                <img src="football_field.jpg" alt="Football Field">
            </div>
        </div>

        <div class="project-box dino-bg">
            <img src="dinosaur.png" class="dino-image" alt="Dinosaur">
        </div>

        <div class="project-box seagull-bg">
            <img src="seagull.png" class="seagull-image" alt="Seagull">
        </div>

        <div class="project-box">
            <img src="butterfly.jpg" class="butterfly-image" alt="Butterfly">
        </div>

        <div class="project-box">
            <div class="theater-wrapper">
                <img src="theater_stage.jpg" alt="Theater Stage">
                <div class="theater-text">Presenting</div>
            </div>
        </div>
    </div>

</body>
</html>
