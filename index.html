<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Assignment - 3x2 Grid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="gallery-container">
        <div class="project-card">
            <div class="penguin-frame">
                <img src="penguins.jpg" alt="Penguins">
            </div>
        </div>

        <div class="project-card">
            <div class="football-outer">
                <div class="football-inner">
                    <img src="football_field.jpg" alt="Field">
                </div>
            </div>
        </div>

        <div class="project-card">
            <div class="dino-box">
                <img src="dinosaur.png" class="dino-img" alt="Dino">
            </div>
        </div>

        <div class="project-card">
            <div class="seagull-box">
                <img src="seagull.png" class="seagull-img" alt="Seagull">
            </div>
        </div>

        <div class="project-card">
            <div class="butterfly-wrap">
                <img src="butterfly.jpg" class="butterfly-img" alt="Butterfly">
            </div>
        </div>

        <div class="project-card">
            <div class="theater-wrap">
                <img src="theater_stage.jpg" alt="Theater">
                <div class="presenting-text">Presenting</div>
            </div>
        </div>
    </div>

</body>
</html>
