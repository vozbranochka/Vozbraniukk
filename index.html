<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Image Manipulation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="gallery">
    <div class="box">
        <img src="penguins.jpg" class="penguins" alt="Penguins">
    </div>

    <div class="box">
        <div class="football-container">
            <img src="football_field.jpg" alt="Football Field">
        </div>
    </div>

    <div class="box dino-box">
        <img src="dinosaur.png" class="dino" alt="Dinosaur">
    </div>

    <div class="box seagull-box">
        <img src="seagull.png" class="seagull" alt="Seagull">
    </div>

    <div class="box">
        <img src="butterfly.jpg" class="butterfly" alt="Butterfly">
    </div>

    <div class="box">
        <div class="theater-container">
            <img src="theater_stage.jpg" alt="Theater Stage">
            <div class="overlay">Presenting</div>
        </div>
    </div>
</div>

</body>
</html>
