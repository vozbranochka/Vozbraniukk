<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Image Manipulation Assignment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="project-card">
            <div class="penguin-frame">
                <img src="penguins.jpg" alt="Penguins">
            </div>
        </div>

        <div class="project-card">
            <div class="football-container">
                <div class="football-bg"></div>
                <div class="tic-tac-toe-border"></div>
            </div>
        </div>

        <div class="project-card">
            <div class="dino-container">
                <img src="dinosaur.png" alt="Dinosaur" class="dino-image">
            </div>
        </div>

        <div class="project-card">
            <div class="seagull-container">
                <img src="seagull.png" alt="Seagull">
            </div>
        </div>

        <div class="project-card">
            <div class="butterfly-container">
                <img src="butterfly.jpg" alt="Butterfly">
            </div>
        </div>

        <div class="project-card">
            <div class="theater-container">
                <img src="theater_stage.jpg" alt="Theater">
                <div class="overlay-text">Presenting</div>
            </div>
        </div>
    </div>

</body>
</html>
